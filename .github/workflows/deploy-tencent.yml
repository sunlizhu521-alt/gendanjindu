name: Deploy Tencent Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tencent-cloud
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.TENCENT_HOST }}
      DEPLOY_USER: ${{ secrets.TENCENT_USER }}
      DEPLOY_PORT: ${{ secrets.TENCENT_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.TENCENT_DEPLOY_PATH || '/www/wwwroot/gendanjindu' }}
      DATA_DIR: ${{ secrets.TENCENT_DATA_DIR || '/www/wwwroot/gendanjindu-data' }}
      APP_PORT: ${{ secrets.TENCENT_APP_PORT || '4003' }}
      DEPLOY_SSH_KEY: ${{ secrets.TENCENT_SSH_KEY }}
      ADMIN_INITIAL_PASSWORD: ${{ secrets.ADMIN_INITIAL_PASSWORD }}
    steps:
      - name: Check required secrets
        run: |
          test -n "$DEPLOY_HOST" || (echo "Missing secret: TENCENT_HOST" && exit 1)
          test -n "$DEPLOY_USER" || (echo "Missing secret: TENCENT_USER" && exit 1)
          test -n "$DEPLOY_PATH" || (echo "Missing secret: TENCENT_DEPLOY_PATH" && exit 1)
          test -n "$DEPLOY_SSH_KEY" || (echo "Missing secret: TENCENT_SSH_KEY" && exit 1)
          test -n "$ADMIN_INITIAL_PASSWORD" || (echo "Missing secret: ADMIN_INITIAL_PASSWORD" && exit 1)

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/tencent_key
          chmod 600 ~/.ssh/tencent_key
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Create runtime environment file
        run: |
          ADMIN_INITIAL_PASSWORD_B64="$(printf '%s' "$ADMIN_INITIAL_PASSWORD" | base64 -w0)"
          printf 'DATA_DIR=%q\nAPP_PORT=%q\nADMIN_INITIAL_PASSWORD_B64=%q\n' "$DATA_DIR" "$APP_PORT" "$ADMIN_INITIAL_PASSWORD_B64" > gendanjindu-runtime.env

      - name: Package dist
        run: tar --exclude=node_modules --exclude=data --exclude=dist --exclude=.git -czf gendanjindu-release.tgz .

      - name: Upload package
        run: |
          scp -i ~/.ssh/tencent_key -P "$DEPLOY_PORT" gendanjindu-release.tgz \
            "$DEPLOY_USER@$DEPLOY_HOST:/tmp/gendanjindu-release.tgz"
          scp -i ~/.ssh/tencent_key -P "$DEPLOY_PORT" gendanjindu-runtime.env \
            "$DEPLOY_USER@$DEPLOY_HOST:/tmp/gendanjindu-runtime.env"

      - name: Release on server
        run: |
          ssh -i ~/.ssh/tencent_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -euo pipefail
             mkdir -p '$DEPLOY_PATH' '$DATA_DIR'
             rm -rf '${DEPLOY_PATH}.next'
             mkdir -p '${DEPLOY_PATH}.next'
             tar -xzf /tmp/gendanjindu-release.tgz -C '${DEPLOY_PATH}.next'
             cd '${DEPLOY_PATH}.next'
             npm ci --omit=dev
             npm run build
             rm -rf '${DEPLOY_PATH}.previous'
             if [ -d '$DEPLOY_PATH/current' ]; then mv '$DEPLOY_PATH/current' '${DEPLOY_PATH}.previous'; fi
             mv '${DEPLOY_PATH}.next' '$DEPLOY_PATH/current'
             cd '$DEPLOY_PATH/current'
             . /tmp/gendanjindu-runtime.env
             ADMIN_INITIAL_PASSWORD=\"\$(printf '%s' \"\$ADMIN_INITIAL_PASSWORD_B64\" | base64 -d)\"
             ADMIN_INITIAL_PASSWORD=\"\$ADMIN_INITIAL_PASSWORD\" DATA_DIR=\"\$DATA_DIR\" PORT=\"\$APP_PORT\" npx pm2 startOrReload ecosystem.config.cjs --update-env
             npx pm2 save
             rm -f /tmp/gendanjindu-release.tgz /tmp/gendanjindu-runtime.env"
