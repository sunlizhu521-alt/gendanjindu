name: Diagnose Domestic Board

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Audit domestic board API field coverage
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -Eeuo pipefail
            cd /home/ubuntu/zhuge-ai-lab/gendanjindu
            TOKEN=$(node --input-type=module - << 'NODE'
              import fs from 'node:fs';
              import initSqlJs from 'sql.js';
              const SQL = await initSqlJs();
              const db = new SQL.Database(fs.readFileSync('data/gendanjindu.sqlite'));
              const result = db.exec("SELECT sessions.token FROM sessions JOIN users ON users.id = sessions.user_id WHERE users.role = '管理员' ORDER BY sessions.created_at DESC LIMIT 1");
              console.log(result[0]?.values?.[0]?.[0] || '');
              db.close();
          NODE
            )
            test -n "$TOKEN"
            RESPONSE=$(mktemp)
            trap 'rm -f "$RESPONSE"' EXIT
            curl -fsS -H "Authorization: Bearer $TOKEN" http://127.0.0.1:4003/api/domestic-board > "$RESPONSE"
            node --input-type=module - "$RESPONSE" << 'NODE'
              import fs from 'node:fs';
              const payload = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));
              const rows = payload.rows || [];
              const present = (field) => rows.filter((row) => String(row[field] ?? '').trim()).length;
              const distinct = (field) => new Set(rows.map((row) => String(row[field] ?? '').trim()).filter(Boolean)).size;
              console.log(JSON.stringify({
                rows: rows.length,
                nonEmpty: {
                  stockupStatus: present('stockupStatus'),
                  brand: present('brand'),
                  productType: present('productType'),
                  systemSku: present('systemSku'),
                  salesProductLine: present('salesProductLine'),
                  salesSeries: present('salesSeries'),
                  model: present('model')
                },
                distinct: {
                  brands: distinct('brand'),
                  productTypes: distinct('productType'),
                  materialCodes: distinct('materialCode')
                },
                sourceApplications: payload.sourceApplications
              }, null, 2));
          NODE
          EOF
