name: Reset Admin Password

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reset admin password via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "mkdir -p /home/ubuntu/zhuge-ai-lab/gendanjindu/scripts"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no scripts/reset-admin-password.js ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/home/ubuntu/zhuge-ai-lab/gendanjindu/scripts/reset-admin-password.js
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            cd /home/ubuntu/zhuge-ai-lab/gendanjindu
            if [ -d data ]; then
              PROJECT_NAME=$(basename "$PWD")
              mkdir -p ~/backups/$PROJECT_NAME
              tar -czf ~/backups/$PROJECT_NAME/data-$(date +%Y%m%d-%H%M%S).tar.gz data
              ls -lh ~/backups/$PROJECT_NAME | tail -5
            fi
            APP_DATA_DIR=$(pm2 jlist | node -e "let s=''; process.stdin.on('data', d => s += d); process.stdin.on('end', () => { const apps = JSON.parse(s); const app = apps.find((item) => item.name === 'gendanjindu'); console.log(app?.pm2_env?.DATA_DIR || './data'); });")
            echo "Using DATA_DIR=$APP_DATA_DIR"
            DATA_DIR="$APP_DATA_DIR" ADMIN_NAME='${{ secrets.ADMIN_NAME }}' ADMIN_RESET_PASSWORD='${{ secrets.ADMIN_RESET_PASSWORD }}' node scripts/reset-admin-password.js
            pm2 restart gendanjindu --update-env
            pm2 save
          EOF
